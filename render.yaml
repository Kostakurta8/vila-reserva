databases:
  - name: vila-reserva-db
    plan: free
    databaseName: vilareserva
    user: vilareserva

services:
  - type: web
    name: vila-reserva
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: vila-reserva-db
          property: connectionString
      - key: APP_PASSWORD
        value: Gashti123
      - key: JWT_SECRET
        generateValue: true
